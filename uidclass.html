<!DOCTYPE html>
<html lang="eg">
    <head>
        <meta charset="UTF-8">
        <meta name="author" content="K.Hitesh">
        
        
    </head>
    <body>
        <p>
        <h1>Event Registration form</h1>
        <h3>About this Event</h3>
        <table border="1">
            <tr>
            <th scope="row">Event Name</th>
            <td>Digital Marketing Masterclass</td>
            </tr>
            <tr>
            <th scope="row">Date</th>
            <td>October 15, 2028</td>
            </tr>
            <tr>
                <th scope="row"> Time</th>
                <td><time datetime="14:00">2:00 PM</time>-<time datetime="17:00">4:00</time>
            </tr>
            <tr>
                <th scope="row"> Speaker</th>
                <td>Sarah JhonSon (digital Marketing Expert)</td>
            </tr>
            </p>
        </table>
        <br>


            
            <form action="https://httpbin.org/get" method="get">
                <fieldset>
                    <legend>Participation information</legend>
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="VISHNU" required autofocus>
                    <p id="dob">
                    <label for="dob">date of birth</label>
                    <input type="number" id="dob" name="dob" placeholder="mm/dd/yyyy" required><br>
                    </p>
                    <label for="Gender" > Gender</label><br>
                    <input type="radio" id="male" name="Gender" value="Male">
                    <label for="male">Male</label><br>
                    <input type="radio" id="female" name="Gender" value="Female">
                    <label for="female">Female</label>
                    <p id="phone">
                    <label for="phone">Phone number</label>
                    <input type="tel" id="phone" name="phone" placeholder="9976696665" pattern="[0-9]{10}" required>
                    </p>
                    <p id="email">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                    </p>
                    <p id="about this event">
                    <label for="heard about it">Where did you hear about this virtual event?</label><br>
                    <input type="radio" id="facebook" name="about event" value="facebook">
                    <label for="facebook">Facebook</label>
                    <input type="radio" id="youtube" name="about event" value="youtube">
                    <label for="youtube">youtube</label>
                    <input type="radio" id="instagram" name="about event" value="instagram">
                    <label for="instagram">Instagram</label>
                    <input type="radio" id="twitter" name="about event" value="twitter">
                    <label for="twitter">Twitter</label>
                    <input type="radio" id="other" name="about event" value="other">
                    <label for="other">Other</label>
                    <textarea name="other" id="other" cols="10" rows="1"></textarea>
                    </p>


                </fieldset>
                <fieldset>
                    <legend>Payment information</legend>
                    <p>
                    <label for="tickets">Number of Tickets</label>
                    <input type="number" name="tickets" required><br>
                    </p>
                    <p>
                    <label for="payment-method">Paymentmethod</label><br>
                    <input type="radio" id="credit-card" name="payment-method" value="credit-card">
                    <label for="credit-card">Credit Card</label>
                    <input type="radio" id="debit-card" name="payment-method" value="debit-card">
                    <label for="debit-card">Debit card</label>
                    <input type="radio" id="cash" name="payment-method" value="cash">
                    <label for="cash">cash</label>
                    <input type="radio" id="check" name="payment-method" value="check">
                    <label for="check">check</label>
                    </p>
                    <label for="signature">signature</label>
                    <textarea name="signature" id="signature" cols="10" rows=""></textarea>

                   

                </fieldset>
            </form>
            
            

        
    </body>
</html>
